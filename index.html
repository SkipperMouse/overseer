<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OVERSEER" />
    <title>OVERSEER</title>
    <style>
      #boot {
        position: fixed; inset: 0; z-index: 99999;
        background: #030803;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: 'JetBrains Mono', monospace;
      }
      #boot::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.20) 2px, rgba(0,0,0,0.20) 4px);
      }
      #boot::after {
        content: '';
        position: fixed; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
      }
      .boot-inner { width: 280px; position: relative; z-index: 1; }
      .boot-line { font-size: 10px; letter-spacing: 1px; line-height: 1.9; opacity: 0; animation: boot-fade-in 0.1s forwards; }
      .boot-dim    { color: #2a4a2a; }
      .boot-brand  { color: #3d6e3d; letter-spacing: 3px; text-transform: uppercase; font-size: 11px; }
      .boot-ok     { color: #00ff41; text-shadow: 0 0 4px #00ff4144; }
      .boot-cursor { color: #6aaa5a; }
      .boot-blink  { display:inline-block; width:7px; height:11px; background:#6aaa5a; animation:blink 1.1s step-end infinite; vertical-align:text-bottom; box-shadow: 0 0 4px #6aaa5a; }
      @keyframes boot-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes rolling-bar { from { transform: translateY(-130px); } to { transform: translateY(100vh); } }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-inner" id="boot-lines"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      var BOOT_LINES = [
        { text: 'RobCo Industries (TM) Unified Operating System', cls: 'boot-dim', delay: 0 },
        { text: 'Personal Information Processor', cls: 'boot-dim', delay: 120 },
        { text: '──────────────────────────────', cls: 'boot-dim', delay: 220 },
        { text: 'OVERSEER  v1.0.0', cls: 'boot-brand', delay: 350 },
        { text: '──────────────────────────────', cls: 'boot-dim', delay: 430 },
        { text: 'checking user data......  <ok>', cls: 'boot-dim', delay: 600 },
        { text: 'loading day plan........  <ok>', cls: 'boot-dim', delay: 800 },
        { text: 'syncing task pool........  <ok>', cls: 'boot-dim', delay: 1000 },
        { text: '──────────────────────────────', cls: 'boot-dim', delay: 1150 },
        { text: '> ready ', cls: 'boot-cursor', delay: 1350, blink: true },
      ];
      var container = document.getElementById('boot-lines');
      BOOT_LINES.forEach(function(line) {
        setTimeout(function() {
          var el = document.createElement('div');
          el.className = 'boot-line ' + line.cls;
          el.innerHTML = line.text.replace('<ok>', '<span class="boot-ok">OK</span>');
          if (line.blink) el.innerHTML += '<span class="boot-blink"></span>';
          container.appendChild(el);
        }, line.delay);
      });
      setTimeout(function() {
        var boot = document.getElementById('boot');
        boot.style.transition = 'opacity 0.4s ease';
        boot.style.opacity = '0';
        setTimeout(function() { boot.remove(); }, 420);
      }, 2000);
      // Scrollbar: show green line only while scrolling
      document.addEventListener('scroll', function(e) {
        var el = e.target;
        if (el && el.classList) {
          el.classList.add('scrolling');
          clearTimeout(el._scrollTimer);
          el._scrollTimer = setTimeout(function() { el.classList.remove('scrolling'); }, 800);
        }
      }, true);
    </script>
  </body>
</html>
